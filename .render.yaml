services:
  - type: web
    name: api-issets
    env: docker
    plan: free
    branch: main
    dockerfilePath: ./DockerFile
    autoDeploy: true
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://<tu-app>.onrender.com
      - key: DB_CONNECTION
        value: pgsql
